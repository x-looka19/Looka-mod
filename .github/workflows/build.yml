name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v4
      
    - name: Download and extract project
      run: |
        wget https://github.com/x-looka19/Looka-mod/raw/main/LookaEngineApp.zip
        unzip LookaEngineApp.zip
        cd LookaEngineApp
        chmod +x gradlew
        ./gradlew assembleDebug
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: LookaEngine
        path: LookaEngineApp/app/build/outputs/apk/debug/*.apk
